services:
  postgres:
    image: postgres:18.4-alpine
    environment:
      POSTGRES_USER: dojiwick
      POSTGRES_PASSWORD: dojiwick
      POSTGRES_DB: dojiwick
    volumes:
      # postgres:18 keeps PGDATA under /var/lib/postgresql/18/docker
      - postgres_data:/var/lib/postgresql
      - ./db/initdb:/docker-entrypoint-initdb.d:ro
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "dojiwick", "-d", "dojiwick"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
      start_interval: 1s
    restart: unless-stopped

  app:
    build:
      context: .
      target: runtime
    profiles: ["live"]
    init: true
    # app shutdown_timeout_sec=30 + margin before SIGKILL
    stop_grace_period: 45s
    environment:
      - BINANCE_API_KEY
      - BINANCE_API_SECRET
      - ANTHROPIC_API_KEY
    volumes:
      - ./config.toml:/app/config.toml:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  tooling:
    build:
      context: .
      target: tooling
    profiles: ["dev"]
    environment:
      DOJIWICK_DB_URL: postgres://dojiwick:dojiwick@postgres:5432/dojiwick?sslmode=disable
      DOJIWICK_TEST_DB_URL: postgres://dojiwick:dojiwick@postgres:5432/dojiwick_test?sslmode=disable
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
