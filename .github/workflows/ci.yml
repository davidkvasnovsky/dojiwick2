name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  COMPOSE_FILE: compose.yaml:compose.ci.yaml

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: crazy-max/ghaction-github-runtime@v4
      - run: make docker-ci
